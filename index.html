<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDL Comparison - Schema Diff</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1>DDL Comparison</h1>
    </div>
    <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Toggle theme">☾ Dark</button>
  </header>

  <main class="container">
    <section class="inputs">
      <div class="input-group">
        <label for="ddl-a">DDL A (original)</label>
        <textarea
          id="ddl-a"
          spellcheck="false"
          placeholder="`id` BIGINT NOT NULL,`name` STRING,`created_at` TIMESTAMP"
        ></textarea>
      </div>
      <div class="input-group">
        <label for="ddl-b">DDL B (modified)</label>
        <textarea
          id="ddl-b"
          spellcheck="false"
          placeholder="`id` BIGINT NOT NULL,`name` STRING NOT NULL,`updated_at` TIMESTAMP"
        ></textarea>
      </div>
    </section>

    <div class="actions">
      <button id="compare-btn" type="button">Compare</button>
      <button id="sample-btn" type="button" class="secondary">Load example</button>
      <button id="clear-btn" type="button" class="secondary">Clear</button>
    </div>

    <section id="summary" class="summary hidden"></section>

    <section id="diff" class="diff hidden">
      <div class="diff-header">
        <div class="diff-side">DDL A</div>
        <div class="diff-side">DDL B</div>
      </div>
      <div id="diff-body" class="diff-body"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
